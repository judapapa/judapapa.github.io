<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>요한계시록 1~22장 성구 암송</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;500;600;700;900&family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#241a10;
  --parchment:#f6f0e2;
  --parchment-2:#efe6d0;
  --navy:#20263f;
  --navy-2:#2c3455;
  --gold:#b8862f;
  --gold-light:#e7c988;
  --red:#a13d2e;
  --red-bg:#f7e2dd;
  --green:#3c6e4d;
  --green-bg:#e2ece2;
  --line:#d8cba9;
  --shadow: 0 10px 30px -12px rgba(36,26,16,.35);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:
    radial-gradient(1200px 600px at 10% -10%, #2c3455 0%, transparent 60%),
    radial-gradient(1000px 500px at 110% 0%, #3a2e1a 0%, transparent 55%),
    var(--parchment);
  color:var(--ink);
  font-family:'Noto Sans KR', sans-serif;
  min-height:100vh;
  padding-bottom:60px;
}
.wrap{max-width:900px;margin:0 auto;padding:18px 16px 40px;}

/* ---------- Header ---------- */
.hero{
  background:linear-gradient(160deg, var(--navy) 0%, var(--navy-2) 70%, #3a2e1a 140%);
  border-radius:22px;
  padding:28px 24px 22px;
  color:var(--parchment);
  box-shadow:var(--shadow);
  position:relative;
  overflow:hidden;
  margin-bottom:16px;
}
.hero::before{
  content:"";
  position:absolute; inset:0;
  background-image: radial-gradient(circle at 85% 20%, rgba(231,201,136,.18), transparent 45%);
  pointer-events:none;
}
.hero .eyebrow{
  font-size:12px; letter-spacing:.18em; text-transform:uppercase;
  color:var(--gold-light); font-weight:700; margin-bottom:8px;
}
.hero h1{
  font-family:'Noto Serif KR', serif;
  font-weight:900;
  font-size:26px;
  margin:0 0 6px;
  line-height:1.35;
}
.hero .sub{
  font-size:13px; color:#cfd3e6; margin:0;
}
.hero .score-row{
  margin-top:16px; display:flex; gap:10px; flex-wrap:wrap;
}
.pill{
  background:rgba(255,255,255,.08);
  border:1px solid rgba(231,201,136,.35);
  border-radius:999px;
  padding:7px 14px;
  font-size:12.5px;
  font-weight:600;
  color:var(--gold-light);
  display:flex; align-items:center; gap:6px;
}

/* ---------- Tabs ---------- */
.tabs{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
  margin-bottom:14px;
}
@media (min-width:640px){ .tabs{grid-template-columns:repeat(6,1fr);} }
.tab-btn{
  background:#fffdf8;
  border:1.5px solid var(--line);
  border-radius:14px;
  padding:11px 6px;
  text-align:center;
  cursor:pointer;
  font-size:12.5px;
  font-weight:700;
  color:var(--ink);
  transition:.15s;
  user-select:none;
}
.tab-btn .ico{display:block;font-size:19px;margin-bottom:3px;}
.tab-btn:hover{border-color:var(--gold);}
.tab-btn.active{
  background:linear-gradient(160deg, var(--navy), var(--navy-2));
  color:var(--parchment);
  border-color:var(--navy);
  box-shadow:var(--shadow);
}

/* ---------- Panel ---------- */
.panel{
  background:#fffdf8;
  border:1px solid var(--line);
  border-radius:18px;
  padding:18px;
  box-shadow:0 4px 18px -10px rgba(36,26,16,.25);
  margin-bottom:14px;
}
.panel h2{
  font-family:'Noto Serif KR',serif;
  font-size:17px;
  margin:0 0 12px;
  display:flex; align-items:center; gap:8px;
}
.panel h2 .n{
  font-size:12px; color:var(--gold); font-weight:700;
  border:1px solid var(--gold); border-radius:999px; padding:2px 9px;
}

/* ---------- settings ---------- */
.settings-grid{
  display:grid; grid-template-columns:1fr 1fr; gap:8px;
  margin-bottom:12px;
}
@media (min-width:560px){ .settings-grid{grid-template-columns:repeat(3,1fr);} }
.toggle{
  display:flex; align-items:center; justify-content:space-between; gap:8px;
  background:var(--parchment-2);
  border:1px solid var(--line);
  border-radius:12px;
  padding:9px 12px;
  font-size:12.5px;
  font-weight:600;
  cursor:pointer;
}
.toggle input{display:none;}
.switch{
  width:34px;height:19px;border-radius:999px;background:#cbbf9c;position:relative;flex:none;
  transition:.15s;
}
.switch::after{
  content:"";position:absolute;top:2px;left:2px;width:15px;height:15px;border-radius:50%;
  background:#fff;transition:.15s; box-shadow:0 1px 3px rgba(0,0,0,.3);
}
.toggle input:checked + .switch{background:var(--gold);}
.toggle input:checked + .switch::after{left:17px;}

.chap-select-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;gap:8px;flex-wrap:wrap;}
.mini-btn{
  background:var(--navy); color:#fff; border:none; border-radius:9px;
  padding:6px 12px; font-size:11.5px; font-weight:700; cursor:pointer;
}
.mini-btn.ghost{background:none;color:var(--navy);border:1px solid var(--navy);}
.mini-btn.danger{background:var(--red);}
.chap-grid{
  display:grid; grid-template-columns:repeat(6,1fr); gap:6px;
}
@media (min-width:560px){ .chap-grid{grid-template-columns:repeat(11,1fr);} }
.chap-chip{
  aspect-ratio:1; display:flex; align-items:center; justify-content:center;
  border-radius:9px; border:1.5px solid var(--line); background:#fff;
  font-size:12.5px; font-weight:700; cursor:pointer; position:relative;
}
.chap-chip.on{background:var(--navy); color:#fff; border-color:var(--navy);}
.chap-chip .dot{
  position:absolute; bottom:3px; right:3px; width:6px;height:6px;border-radius:50%;
}
.chap-chip .dot.done{background:var(--green);}
.chap-chip .dot.some{background:var(--gold);}

/* ---------- verse card ---------- */
.ref-badge{
  display:inline-flex; align-items:center; gap:6px;
  background:var(--navy); color:var(--gold-light); font-weight:800; font-size:13px;
  padding:6px 13px; border-radius:999px; margin-bottom:10px;
}
.subtitle{
  font-family:'Noto Serif KR',serif;
  font-weight:700; font-size:15px; color:var(--red);
  margin:0 0 8px;
}
.verse-text{
  font-family:'Noto Serif KR',serif;
  font-size:18px; line-height:1.9; color:var(--ink);
}
textarea.answer-box{
  width:100%; min-height:110px; border-radius:12px; border:1.5px solid var(--line);
  padding:12px 14px; font-family:'Noto Serif KR',serif; font-size:16.5px; line-height:1.8;
  resize:vertical; background:var(--parchment-2);
}
textarea.answer-box:focus{outline:2px solid var(--gold); background:#fff;}

.btn-row{display:flex; gap:8px; margin-top:12px; flex-wrap:wrap;}
.btn{
  border:none; border-radius:12px; padding:11px 18px; font-weight:800; font-size:13.5px;
  cursor:pointer; transition:.15s;
}
.btn-primary{background:var(--navy); color:#fff;}
.btn-primary:hover{background:var(--navy-2);}
.btn-secondary{background:var(--parchment-2); color:var(--ink); border:1.5px solid var(--line);}
.btn-gold{background:var(--gold); color:#2b1f0c;}
.btn-danger{background:var(--red); color:#fff;}
.btn:disabled{opacity:.45; cursor:not-allowed;}

.diff-box{
  margin-top:14px; padding:14px; border-radius:12px; background:var(--parchment-2);
  font-family:'Noto Serif KR',serif; font-size:16px; line-height:1.85;
  border:1px solid var(--line);
}
.diff-box .lbl{font-family:'Noto Sans KR',sans-serif; font-size:11.5px; font-weight:800; color:#8a7a52; margin-bottom:6px; letter-spacing:.05em;}
.w-ok{color:var(--green); }
.w-bad{background:var(--red-bg); color:var(--red); border-radius:4px; padding:0 2px;}
.w-miss{background:#f2e3c7; color:#7a5a12; border-radius:4px; padding:0 2px; text-decoration:underline dashed;}

.result-badge{
  display:inline-block; padding:5px 13px; border-radius:999px; font-weight:800; font-size:12.5px; margin-top:10px;
}
.result-badge.ok{background:var(--green-bg); color:var(--green);}
.result-badge.bad{background:var(--red-bg); color:var(--red);}

.progress-line{font-size:12px; color:#7a6a45; font-weight:700; margin-bottom:10px;}

/* study list */
.study-item{padding:14px 0; border-bottom:1px dashed var(--line);}
.study-item:last-child{border-bottom:none;}
.study-item .vnum{color:var(--gold); font-weight:800; margin-right:6px; font-family:'Noto Sans KR';font-size:14px;}

/* fill-blank */
.blank-input{
  display:inline-block; width:76px; border:none; border-bottom:2px solid var(--gold);
  background:transparent; font-family:'Noto Serif KR',serif; font-size:16.5px; text-align:center;
  padding:0 2px; margin:0 2px;
}
.blank-input.ok{border-color:var(--green); color:var(--green); font-weight:700;}
.blank-input.bad{border-color:var(--red); color:var(--red); font-weight:700;}

/* wrong-note list */
.wrong-item{
  display:flex; align-items:center; justify-content:space-between; gap:10px;
  padding:11px 4px; border-bottom:1px solid var(--line);
}
.wrong-item .info{font-size:13px;}
.wrong-item .info b{color:var(--red); font-family:'Noto Serif KR',serif;}
.small-x{
  background:none; border:1px solid var(--line); border-radius:8px; padding:5px 9px; cursor:pointer; font-size:11px; font-weight:700; color:#8a7a52;
}

/* mock exam summary */
.summary-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:14px;}
.summary-card{background:var(--parchment-2); border:1px solid var(--line); border-radius:12px; padding:14px; text-align:center;}
.summary-card .num{font-size:24px; font-weight:900; color:var(--navy); font-family:'Noto Serif KR',serif;}
.summary-card .lbl{font-size:11px; font-weight:700; color:#8a7a52;}

.empty-state{text-align:center; padding:40px 10px; color:#8a7a52; font-size:13.5px;}
.empty-state .ico{font-size:34px; display:block; margin-bottom:10px;}

footer{text-align:center; font-size:11.5px; color:#8a7a52; margin-top:18px; padding:0 10px;}

::selection{background:var(--gold-light);}
</style>
</head>
<body>
<div class="wrap">

  <div class="hero">
    <div class="eyebrow">개역한글 · REVELATION 1–22</div>
    <h1>요한계시록 성구 암송</h1>
    <p class="sub">필승! 강력하고 확실하게 승리하자 — 1장부터 22장 전장을 암송합니다</p>
    <div class="score-row">
      <div class="pill" id="pillTotal">🏆 0 / 0 절 정복</div>
      <div class="pill" id="pillWrong">📒 오답 0</div>
      <div class="pill" id="pillRate">📈 정답률 0%</div>
    </div>
  </div>

  <div class="tabs" id="tabs">
    <div class="tab-btn active" data-mode="study"><span class="ico">📖</span>학습모드</div>
    <div class="tab-btn" data-mode="quiz"><span class="ico">✍️</span>퀴즈</div>
    <div class="tab-btn" data-mode="blank"><span class="ico">🧩</span>빈칸채우기</div>
    <div class="tab-btn" data-mode="write"><span class="ico">✏️</span>따라쓰기</div>
    <div class="tab-btn" data-mode="exam"><span class="ico">📝</span>모의고사</div>
    <div class="tab-btn" data-mode="wrong"><span class="ico">📒</span>오답노트</div>
  </div>

  <div class="panel">
    <h2>⚙️ 설정 <span class="n" id="chapCountLbl">22장 선택됨</span></h2>
    <div class="settings-grid">
      <label class="toggle">띄어쓰기까지 정확히
        <input type="checkbox" id="optExactSpace">
        <span class="switch"></span>
      </label>
      <label class="toggle">절 순서 무작위
        <input type="checkbox" id="optRandom">
        <span class="switch"></span>
      </label>
      <label class="toggle">절 순서 거꾸로
        <input type="checkbox" id="optReverse">
        <span class="switch"></span>
      </label>
    </div>
    <div class="chap-select-head">
      <div style="font-size:12.5px;font-weight:700;color:#6b5c38;">암송할 장을 선택하세요</div>
      <div style="display:flex;gap:6px;">
        <button class="mini-btn ghost" id="btnAll">전체선택</button>
        <button class="mini-btn ghost" id="btnNone">전체해제</button>
        <button class="mini-btn danger" id="btnResetChap">이 장 초기화</button>
        <button class="mini-btn danger" id="btnResetAll">전체 초기화</button>
      </div>
    </div>
    <div class="chap-grid" id="chapGrid"></div>
  </div>

  <div id="modeArea"></div>

  <footer>개역한글 성경 본문 · 성구 암송을 위한 학습 도구입니다 · 진행 상황은 이 브라우저에 저장됩니다</footer>
</div>

<script>

<script>
/* ============================================================
   요한계시록 성구 암송 앱
   REV 데이터는 data.js 에서 로드됨: REV = { "1":[{v,title,text}, ...], ... }
   ============================================================ */

const LS_PROGRESS = 'rev_progress_v1';   // { "1:1": {status:'correct'|'wrong', attempts, lastAt} }
const LS_SETTINGS  = 'rev_settings_v1';   // { exact, random, reverse, chapters:[1..22] }
const LS_WRONG     = 'rev_wrong_v1';      // [ "1:1", "3:5", ... ]

const ALL_CHAPS = Object.keys(REV).map(Number).sort((a,b)=>a-b);

function loadJSON(key, fallback){
  try{
    const raw = localStorage.getItem(key);
    if(!raw) return fallback;
    return JSON.parse(raw);
  }catch(e){ return fallback; }
}
function saveJSON(key, val){
  try{ localStorage.setItem(key, JSON.stringify(val)); }catch(e){}
}

let progress = loadJSON(LS_PROGRESS, {});
let wrongSet = new Set(loadJSON(LS_WRONG, []));
let settings = loadJSON(LS_SETTINGS, {
  exact:false, random:false, reverse:false, chapters:[...ALL_CHAPS]
});
if(!settings.chapters || settings.chapters.length===0) settings.chapters=[...ALL_CHAPS];

let state = {
  mode:'study',
  queue:[],        // array of {chap,v}
  qIndex:0,
  examQuestions:[],
  examAnswers:[],
  examActive:false,
  blankAnswers:{},
};

/* ---------------- helpers ---------------- */
function verseOf(chap, v){
  const arr = REV[chap];
  return arr.find(x=>x.v===v);
}
function verseId(chap,v){ return chap+':'+v; }

function allVersesInSelection(){
  let out=[];
  settings.chapters.slice().sort((a,b)=>a-b).forEach(c=>{
    (REV[c]||[]).forEach(item=>{
      out.push({chap:c, v:item.v});
    });
  });
  return out;
}

function buildQueue(){
  let list = allVersesInSelection();
  if(settings.random){
    for(let i=list.length-1;i>0;i--){
      const j = Math.floor(Math.random()*(i+1));
      [list[i],list[j]]=[list[j],list[i]];
    }
  } else if(settings.reverse){
    list = list.slice().reverse();
  }
  return list;
}

function normalize(str, exact){
  let s = str.trim();
  if(!exact){
    s = s.replace(/\s+/g,'');
  } else {
    s = s.replace(/\s+/g,' ');
  }
  return s;
}

/* word-level diff using simple LCS, works reasonably for Korean (space separated) */
function wordDiff(correct, given){
  const a = correct.trim().split(/\s+/).filter(Boolean);
  const b = given.trim().split(/\s+/).filter(Boolean);
  const n=a.length, m=b.length;
  const dp = Array.from({length:n+1},()=>new Array(m+1).fill(0));
  for(let i=n-1;i>=0;i--){
    for(let j=m-1;j>=0;j--){
      if(a[i]===b[j]) dp[i][j]=dp[i+1][j+1]+1;
      else dp[i][j]=Math.max(dp[i+1][j],dp[i][j+1]);
    }
  }
  let i=0,j=0; const outA=[]; // rendering against the "correct" sequence
  while(i<n && j<m){
    if(a[i]===b[j]){ outA.push({t:a[i],ok:true}); i++; j++; }
    else if(dp[i+1][j] >= dp[i][j+1]){ outA.push({t:a[i],ok:false,missing:true}); i++; }
    else { j++; } // extra word typed, skip (not shown against correct sequence)
  }
  while(i<n){ outA.push({t:a[i],ok:false,missing:true}); i++; }
  return outA;
}

function isCorrect(correctText, givenText){
  return normalize(correctText, settings.exact) === normalize(givenText, settings.exact) && givenText.trim().length>0;
}

function recordResult(chap, v, ok){
  const id = verseId(chap,v);
  const rec = progress[id] || {attempts:0};
  rec.attempts = (rec.attempts||0)+1;
  rec.status = ok ? 'correct' : 'wrong';
  rec.lastAt = Date.now();
  progress[id]=rec;
  if(ok){ wrongSet.delete(id); } else { wrongSet.add(id); }
  saveJSON(LS_PROGRESS, progress);
  saveJSON(LS_WRONG, Array.from(wrongSet));
  refreshHeader();
  renderChapGrid();
}

/* ---------------- header stats ---------------- */
function refreshHeader(){
  const sel = allVersesInSelection();
  let correctCount=0;
  sel.forEach(({chap,v})=>{
    const r = progress[verseId(chap,v)];
    if(r && r.status==='correct') correctCount++;
  });
  document.getElementById('pillTotal').textContent = `🏆 ${correctCount} / ${sel.length} 절 정복`;
  document.getElementById('pillWrong').textContent = `📒 오답 ${wrongSet.size}`;
  let attempts=0, corrects=0;
  Object.values(progress).forEach(r=>{ attempts+= (r.attempts||0); if(r.status==='correct') corrects++; });
  const totalTried = Object.keys(progress).length;
  const rate = totalTried? Math.round(100*corrects/totalTried) : 0;
  document.getElementById('pillRate').textContent = `📈 정답률 ${rate}%`;
  document.getElementById('chapCountLbl').textContent = `${settings.chapters.length}장 선택됨`;
}

/* ---------------- chapter grid ---------------- */
function renderChapGrid(){
  const grid = document.getElementById('chapGrid');
  grid.innerHTML='';
  ALL_CHAPS.forEach(c=>{
    const chip = document.createElement('div');
    chip.className = 'chap-chip' + (settings.chapters.includes(c) ? ' on':'');
    chip.textContent = c;
    const verses = REV[c];
    const doneCount = verses.filter(item=>{
      const r = progress[verseId(c,item.v)];
      return r && r.status==='correct';
    }).length;
    if(doneCount===verses.length){
      const dot = document.createElement('div'); dot.className='dot done'; chip.appendChild(dot);
    } else if(doneCount>0){
      const dot = document.createElement('div'); dot.className='dot some'; chip.appendChild(dot);
    }
    chip.addEventListener('click', ()=>{
      const idx = settings.chapters.indexOf(c);
      if(idx>=0) settings.chapters.splice(idx,1);
      else settings.chapters.push(c);
      if(settings.chapters.length===0) settings.chapters=[c];
      saveJSON(LS_SETTINGS, settings);
      renderChapGrid();
      refreshHeader();
      renderMode();
    });
    grid.appendChild(chip);
  });
}

/* ---------------- settings wiring ---------------- */
function wireSettings(){
  const exact = document.getElementById('optExactSpace');
  const rand = document.getElementById('optRandom');
  const rev = document.getElementById('optReverse');
  exact.checked = !!settings.exact;
  rand.checked = !!settings.random;
  rev.checked = !!settings.reverse;
  exact.addEventListener('change', ()=>{ settings.exact=exact.checked; saveJSON(LS_SETTINGS,settings); });
  rand.addEventListener('change', ()=>{ settings.random=rand.checked; if(rand.checked){rev.checked=false;settings.reverse=false;} saveJSON(LS_SETTINGS,settings); renderMode(); });
  rev.addEventListener('change', ()=>{ settings.reverse=rev.checked; if(rev.checked){rand.checked=false;settings.random=false;} saveJSON(LS_SETTINGS,settings); renderMode(); });

  document.getElementById('btnAll').addEventListener('click', ()=>{
    settings.chapters=[...ALL_CHAPS]; saveJSON(LS_SETTINGS,settings); renderChapGrid(); refreshHeader(); renderMode();
  });
  document.getElementById('btnNone').addEventListener('click', ()=>{
    settings.chapters=[ALL_CHAPS[0]]; saveJSON(LS_SETTINGS,settings); renderChapGrid(); refreshHeader(); renderMode();
  });
  document.getElementById('btnResetChap').addEventListener('click', ()=>{
    if(!confirm(`선택된 ${settings.chapters.length}개 장의 학습 기록을 초기화할까요?`)) return;
    settings.chapters.forEach(c=>{
      (REV[c]||[]).forEach(item=>{
        const id = verseId(c,item.v);
        delete progress[id];
        wrongSet.delete(id);
      });
    });
    saveJSON(LS_PROGRESS,progress); saveJSON(LS_WRONG, Array.from(wrongSet));
    refreshHeader(); renderChapGrid(); renderMode();
  });
  document.getElementById('btnResetAll').addEventListener('click', ()=>{
    if(!confirm('전체 학습 기록(모든 장)을 초기화할까요? 되돌릴 수 없습니다.')) return;
    progress = {}; wrongSet = new Set();
    saveJSON(LS_PROGRESS,progress); saveJSON(LS_WRONG, []);
    refreshHeader(); renderChapGrid(); renderMode();
  });
}

/* ================= MODE: STUDY ================= */
function renderStudy(){

  const list = allVersesInSelection();

  let html = `<div class="panel"><h2>📖 학습모드 <span class="n">${list.length}절</span></h2>`;

/* ================= MODE: QUIZ ================= */
function renderQuiz(){
  const area = document.getElementById('modeArea');
  if(state.queue.length===0 || state.mode!=='quiz-active'){ /* noop */ }
  if(!state._quizQueue || state._quizQueueDirty){
    state._quizQueue = buildQueue();
    state._quizIndex = 0;
    state._quizQueueDirty = false;
  }
  const queue = state._quizQueue;
  if(queue.length===0){ area.innerHTML = emptyState('선택된 장이 없습니다','장을 하나 이상 선택해주세요'); return; }
  if(state._quizIndex >= queue.length){
    area.innerHTML = `<div class="panel"><div class="empty-state"><span class="ico">🎉</span>선택한 범위를 모두 풀었습니다!<br><button class="btn btn-primary" id="quizRestart" style="margin-top:14px;">처음부터 다시 풀기</button></div></div>`;
    document.getElementById('quizRestart').addEventListener('click', ()=>{ state._quizQueueDirty=true; renderQuiz(); });
    return;
  }
  const {chap,v} = queue[state._quizIndex];
  const item = verseOf(chap,v);
  let html = `<div class="panel">`;
  html += `<div class="progress-line">진행 ${state._quizIndex+1} / ${queue.length}</div>`;
  html += `<div class="ref-badge">계 ${chap}장 ${v}절</div>`;
  if(item.title) html += `<div class="subtitle">🔖 ${escapeHtml(item.title)}</div>`;
  html += `<textarea class="answer-box" id="quizInput" placeholder="말씀을 기억하며 이 절을 입력하세요..."></textarea>`;
  html += `<div class="btn-row">
      <button class="btn btn-primary" id="quizCheck">채점하기</button>
      <button class="btn btn-secondary" id="quizSkip">건너뛰기</button>
    </div>`;
  html += `<div id="quizResultArea"></div>`;
  html += `</div>`;
  area.innerHTML = html;

  const input = document.getElementById('quizInput');
  input.focus();
  document.getElementById('quizCheck').addEventListener('click', ()=>doQuizCheck(chap,v,item));
  input.addEventListener('keydown', (e)=>{
    if(e.key==='Enter' && (e.ctrlKey||e.metaKey)) doQuizCheck(chap,v,item);
  });
  document.getElementById('quizSkip').addEventListener('click', ()=>{
    state._quizIndex++;
    renderQuiz();
  });
}
function doQuizCheck(chap,v,item){
  const input = document.getElementById('quizInput');
  const given = input.value;
  const ok = isCorrect(item.text, given);
  recordResult(chap,v,ok);
  const diff = wordDiff(item.text, given);
  let diffHtml = diff.map(w=> w.ok ? `<span class="w-ok">${escapeHtml(w.t)}</span>` : `<span class="w-miss">${escapeHtml(w.t)}</span>`).join(' ');
  const resArea = document.getElementById('quizResultArea');
  resArea.innerHTML = `
    <span class="result-badge ${ok?'ok':'bad'}">${ok? '✅ 정답입니다!' : '❌ 다시 확인해보세요'}</span>
    <div class="diff-box">
      <div class="lbl">원문 대조 (노란 밑줄 = 놓치거나 틀린 부분)</div>
      ${diffHtml}
    </div>
    <div class="btn-row">
      <button class="btn btn-gold" id="quizNext">다음 절 →</button>
    </div>
  `;
  document.getElementById('quizNext').addEventListener('click', ()=>{
    state._quizIndex++;
    renderQuiz();
  });
  document.getElementById('quizCheck').disabled = true;
}

/* ================= MODE: FILL IN THE BLANK ================= */
function renderBlank(){
  const area = document.getElementById('modeArea');
  if(!state._blankQueue || state._blankQueueDirty){
    state._blankQueue = buildQueue();
    state._blankIndex = 0;
    state._blankQueueDirty = false;
  }
  const queue = state._blankQueue;
  if(queue.length===0){ area.innerHTML = emptyState('선택된 장이 없습니다','장을 하나 이상 선택해주세요'); return; }
  if(state._blankIndex >= queue.length){
    area.innerHTML = `<div class="panel"><div class="empty-state"><span class="ico">🧩</span>모든 문제를 완료했습니다!<br><button class="btn btn-primary" id="blankRestart" style="margin-top:14px;">다시 시작</button></div></div>`;
    document.getElementById('blankRestart').addEventListener('click', ()=>{ state._blankQueueDirty=true; renderBlank(); });
    return;
  }
  const {chap,v} = queue[state._blankIndex];
  const item = verseOf(chap,v);
  const words = item.text.split(/(\s+)/); // keep separators
  // choose ~30% of actual word tokens (non-space) as blanks, min 1
  const wordIdxs = [];
  words.forEach((w,i)=>{ if(w.trim().length>0) wordIdxs.push(i); });
  const blankCount = Math.max(1, Math.round(wordIdxs.length*0.3));
  const shuffled = wordIdxs.slice().sort(()=>Math.random()-0.5).slice(0,blankCount).sort((a,b)=>a-b);
  state._blankAnswerKey = {};
  let html = `<div class="panel">`;
  html += `<div class="progress-line">진행 ${state._blankIndex+1} / ${queue.length}</div>`;
  html += `<div class="ref-badge">계 ${chap}장 ${v}절</div>`;
  if(item.title) html += `<div class="subtitle">🔖 ${escapeHtml(item.title)}</div>`;
  html += `<div class="verse-text" id="blankSentence">`;
  let blankNo=0;
  words.forEach((w,i)=>{
    if(shuffled.includes(i)){
      blankNo++;
      state._blankAnswerKey[blankNo]=w;
      const widthCh = Math.max(3, Math.min(10, w.length+1));
      html += `<input class="blank-input" id="blank_${blankNo}" data-idx="${blankNo}" style="width:${widthCh}ch" autocomplete="off">`;
    } else {
      html += escapeHtml(w);
    }
  });
  html += `</div>`;
  html += `<div class="btn-row">
    <button class="btn btn-primary" id="blankCheck">채점하기</button>
    <button class="btn btn-secondary" id="blankSkip">건너뛰기</button>
  </div>`;
  html += `<div id="blankResultArea"></div>`;
  html += `</div>`;
  area.innerHTML = html;

  document.getElementById('blankCheck').addEventListener('click', ()=>{
    let allOk = true;
    Object.keys(state._blankAnswerKey).forEach(no=>{
      const inp = document.getElementById('blank_'+no);
      const correctWord = state._blankAnswerKey[no].trim();
      const given = inp.value.trim();
      const ok = settings.exact ? given===correctWord : given.replace(/\s+/g,'')===correctWord.replace(/\s+/g,'');
      inp.classList.remove('ok','bad');
      inp.classList.add(ok?'ok':'bad');
      inp.disabled=true;
      if(!ok){ allOk=false; inp.value = correctWord; }
    });
    recordResult(chap,v,allOk);
    document.getElementById('blankResultArea').innerHTML = `
      <span class="result-badge ${allOk?'ok':'bad'}">${allOk?'✅ 정답입니다!':'❌ 빨간 칸이 정답으로 채워졌습니다'}</span>
      <div class="btn-row"><button class="btn btn-gold" id="blankNext">다음 절 →</button></div>
    `;
    document.getElementById('blankNext').addEventListener('click', ()=>{ state._blankIndex++; renderBlank(); });
    document.getElementById('blankCheck').disabled=true;
  });
  document.getElementById('blankSkip').addEventListener('click', ()=>{ state._blankIndex++; renderBlank(); });
  const firstBlank = document.getElementById('blank_1');
  if(firstBlank) firstBlank.focus();
}

/* ================= MODE: WRITE-ALONG (따라쓰기) ================= */
function renderWrite(){
  const area = document.getElementById('modeArea');
  if(!state._writeQueue || state._writeQueueDirty){
    state._writeQueue = buildQueue();
    state._writeIndex = 0;
    state._writeQueueDirty = false;
  }
  const queue = state._writeQueue;
  if(queue.length===0){ area.innerHTML = emptyState('선택된 장이 없습니다','장을 하나 이상 선택해주세요'); return; }
  if(state._writeIndex >= queue.length){
    area.innerHTML = `<div class="panel"><div class="empty-state"><span class="ico">✏️</span>모든 절을 따라 썼습니다!<br><button class="btn btn-primary" id="writeRestart" style="margin-top:14px;">처음부터</button></div></div>`;
    document.getElementById('writeRestart').addEventListener('click', ()=>{ state._writeQueueDirty=true; renderWrite(); });
    return;
  }
  const {chap,v} = queue[state._writeIndex];
  const item = verseOf(chap,v);
  let html = `<div class="panel">`;
  html += `<div class="progress-line">진행 ${state._writeIndex+1} / ${queue.length} · 실시간으로 맞는 부분은 초록색, 틀린 부분은 빨간색으로 표시됩니다</div>`;
  html += `<div class="ref-badge">계 ${chap}장 ${v}절</div>`;
  if(item.title) html += `<div class="subtitle">🔖 ${escapeHtml(item.title)}</div>`;
  html += `<div class="verse-text" style="opacity:.55;margin-bottom:10px;">${escapeHtml(item.text)}</div>`;
  html += `<textarea class="answer-box" id="writeInput" placeholder="위 말씀을 그대로 따라 써보세요..."></textarea>`;
  html += `<div id="writeLive" class="diff-box" style="display:none;"><div class="lbl">실시간 대조</div><div id="writeLiveText"></div></div>`;
  html += `<div class="btn-row">
    <button class="btn btn-primary" id="writeNext">다음 절 →</button>
  </div>`;
  html += `</div>`;
  area.innerHTML = html;

  const input = document.getElementById('writeInput');
  input.focus();
  input.addEventListener('input', ()=>{
    const live = document.getElementById('writeLive');
    const liveText = document.getElementById('writeLiveText');
    if(input.value.length===0){ live.style.display='none'; return; }
    live.style.display='block';
    // char-level compare against correct text
    const correct = item.text;
    const given = input.value;
    let out='';
    for(let i=0;i<given.length;i++){
      const c = given[i];
      if(correct[i]===c) out += `<span class="w-ok">${escapeHtml(c)}</span>`;
      else out += `<span class="w-bad">${escapeHtml(c)}</span>`;
    }
    liveText.innerHTML = out;
  });
  document.getElementById('writeNext').addEventListener('click', ()=>{
    const given = input.value;
    const ok = isCorrect(item.text, given);
    if(given.trim().length>0) recordResult(chap,v,ok);
    state._writeIndex++;
    renderWrite();
  });
}

/* ================= MODE: MOCK EXAM (모의고사) ================= */
function renderExam(){
  const area = document.getElementById('modeArea');
  if(!state.examActive){
    const total = allVersesInSelection().length;
    let html = `<div class="panel">
      <h2>📝 모의고사 <span class="n">${total}절 중 출제</span></h2>
      <p style="font-size:13px;color:#6b5c38;line-height:1.7;">선택한 장(章) 범위 안에서 문제 수를 정해 모의고사를 치릅니다. 채점은 마지막에 한꺼번에 이루어지며, 틀린 절은 자동으로 오답노트에 저장됩니다.</p>
      <div class="settings-grid" style="grid-template-columns:repeat(2,1fr);">
        <button class="btn btn-secondary examCountBtn" data-n="10">10문제</button>
        <button class="btn btn-secondary examCountBtn" data-n="20">20문제</button>
        <button class="btn btn-secondary examCountBtn" data-n="30">30문제</button>
        <button class="btn btn-secondary examCountBtn" data-n="all">전체(${total})</button>
      </div>
    </div>`;
    area.innerHTML = html;
    document.querySelectorAll('.examCountBtn').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        let n = btn.dataset.n==='all' ? total : parseInt(btn.dataset.n,10);
        let pool = allVersesInSelection();
        for(let i=pool.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [pool[i],pool[j]]=[pool[j],pool[i]]; }
        state.examQuestions = pool.slice(0, Math.min(n,pool.length));
        state.examAnswers = new Array(state.examQuestions.length).fill('');
        state.examIndex = 0;
        state.examActive = true;
        state.examDone = false;
        renderExam();
      });
    });
    return;
  }

  if(state.examDone){
    renderExamResult();
    return;
  }

  const {chap,v} = state.examQuestions[state.examIndex];
  const item = verseOf(chap,v);
  let html = `<div class="panel">`;
  html += `<div class="progress-line">모의고사 진행 ${state.examIndex+1} / ${state.examQuestions.length}</div>`;
  html += `<div class="ref-badge">계 ${chap}장 ${v}절</div>`;
  if(item.title) html += `<div class="subtitle">🔖 ${escapeHtml(item.title)}</div>`;
  html += `<textarea class="answer-box" id="examInput" placeholder="말씀을 입력하세요...">${escapeHtml(state.examAnswers[state.examIndex]||'')}</textarea>`;
  html += `<div class="btn-row">
      ${state.examIndex>0 ? '<button class="btn btn-secondary" id="examPrev">← 이전</button>' : ''}
      <button class="btn btn-primary" id="examNext">${state.examIndex===state.examQuestions.length-1 ? '제출하고 채점하기' : '다음 →'}</button>
    </div>`;
  html += `</div>`;
  area.innerHTML = html;
  const input = document.getElementById('examInput');
  input.focus();
  const saveCurrent = ()=>{ state.examAnswers[state.examIndex] = input.value; };
  if(document.getElementById('examPrev')){
    document.getElementById('examPrev').addEventListener('click', ()=>{ saveCurrent(); state.examIndex--; renderExam(); });
  }
  document.getElementById('examNext').addEventListener('click', ()=>{
    saveCurrent();
    if(state.examIndex===state.examQuestions.length-1){
      state.examDone = true;
      // grade all
      state.examQuestions.forEach((q,i)=>{
        const it = verseOf(q.chap,q.v);
        const ok = isCorrect(it.text, state.examAnswers[i]||'');
        recordResult(q.chap,q.v,ok);
      });
      renderExam();
    } else {
      state.examIndex++;
      renderExam();
    }
  });
}
function renderExamResult(){
  const area = document.getElementById('modeArea');
  let correct=0;
  const rows = state.examQuestions.map((q,i)=>{
    const it = verseOf(q.chap,q.v);
    const ok = isCorrect(it.text, state.examAnswers[i]||'');
    if(ok) correct++;
    return {q,it,ok,given:state.examAnswers[i]||''};
  });
  const pct = Math.round(100*correct/rows.length);
  let html = `<div class="panel">
    <h2>📝 모의고사 결과</h2>
    <div class="summary-grid">
      <div class="summary-card"><div class="num">${rows.length}</div><div class="lbl">전체 문제</div></div>
      <div class="summary-card"><div class="num" style="color:var(--green)">${correct}</div><div class="lbl">정답</div></div>
      <div class="summary-card"><div class="num" style="color:${pct>=80?'var(--green)':'var(--red)'}">${pct}%</div><div class="lbl">정답률</div></div>
    </div>`;
  rows.forEach(r=>{
    const diff = wordDiff(r.it.text, r.given);
    const diffHtml = diff.map(w=> w.ok ? `<span class="w-ok">${escapeHtml(w.t)}</span>` : `<span class="w-miss">${escapeHtml(w.t)}</span>`).join(' ');
    html += `<div class="study-item">
      <div class="ref-badge" style="background:${r.ok?'var(--green)':'var(--red)'}">계 ${r.q.chap}장 ${r.q.v}절 ${r.ok?'✅':'❌'}</div>
      <div class="diff-box">${diffHtml}</div>
    </div>`;
  });
  html += `<div class="btn-row"><button class="btn btn-primary" id="examRestart">새 모의고사 시작</button></div>`;
  html += `</div>`;
  area.innerHTML = html;
  document.getElementById('examRestart').addEventListener('click', ()=>{
    state.examActive=false; state.examDone=false; renderExam();
  });
}

/* ================= MODE: WRONG NOTE (오답노트) ================= */
function renderWrong(){
  const area = document.getElementById('modeArea');
  const ids = Array.from(wrongSet).filter(id=>{
    const [c] = id.split(':').map(Number);
    return settings.chapters.includes(c);
  }).sort((a,b)=>{
    const [ac,av]=a.split(':').map(Number);
    const [bc,bv]=b.split(':').map(Number);
    return ac-bc || av-bv;
  });
  if(ids.length===0){
    area.innerHTML = emptyState('오답노트가 비어있어요','틀린 절이 없거나, 아직 모두 맞혔습니다 🎉');
    return;
  }
  let html = `<div class="panel"><h2>📒 오답노트 <span class="n">${ids.length}절</span></h2>`;
  html += `<div class="btn-row" style="margin-top:0;margin-bottom:14px;">
    <button class="btn btn-gold" id="retryWrong">오답만 다시 풀기</button>
  </div>`;
  ids.forEach(id=>{
    const [c,v] = id.split(':').map(Number);
    const item = verseOf(c,v);
    html += `<div class="wrong-item">
      <div class="info"><b>계 ${c}장 ${v}절</b>${item.title? ' · '+escapeHtml(item.title):''}</div>
      <button class="small-x" data-id="${id}">지우기</button>
    </div>`;
  });
  html += `</div>`;
  area.innerHTML = html;
  document.querySelectorAll('.small-x').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      wrongSet.delete(btn.dataset.id);
      saveJSON(LS_WRONG, Array.from(wrongSet));
      refreshHeader();
      renderWrong();
    });
  });
  document.getElementById('retryWrong').addEventListener('click', ()=>{
    state._quizQueue = ids.map(id=>{ const [c,v]=id.split(':').map(Number); return {chap:c,v}; });
    state._quizIndex = 0;
    state._quizQueueDirty = false;
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    document.querySelector('.tab-btn[data-mode="quiz"]').classList.add('active');
    state.mode='quiz';
    renderMode();
  });
}

/* ---------------- shared ---------------- */
function emptyState(title, sub){
  return `<div class="panel"><div class="empty-state"><span class="ico">📭</span><b style="display:block;color:var(--ink);font-size:14.5px;margin-bottom:4px;">${title}</b>${sub}</div></div>`;
}
function escapeHtml(s){
  return (s||'').replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

/* ---------------- router ---------------- */
function renderMode(){
  switch(state.mode){
    case 'study': renderStudy(); break;
    case 'quiz': renderQuiz(); break;
    case 'blank': renderBlank(); break;
    case 'write': renderWrite(); break;
    case 'exam': renderExam(); break;
    case 'wrong': renderWrong(); break;
    default: renderStudy();
  }
}

/* mark queues dirty whenever chapter selection or order settings change */
const origRenderChapGrid = renderChapGrid;
function markAllQueuesDirty(){
  state._quizQueueDirty = true;
  state._blankQueueDirty = true;
  state._writeQueueDirty = true;
}

/* ---------------- init ---------------- */
function init(){
  wireTabs();
  wireSettings();
  renderChapGrid();
  refreshHeader();
  renderMode();

  // hook chapter/order changes to invalidate queues
  document.getElementById('chapGrid').addEventListener('click', markAllQueuesDirty);
  document.getElementById('optRandom').addEventListener('change', markAllQueuesDirty);
  document.getElementById('optReverse').addEventListener('change', markAllQueuesDirty);
  document.getElementById('btnAll').addEventListener('click', markAllQueuesDirty);
  document.getElementById('btnNone').addEventListener('click', markAllQueuesDirty);
}
document.addEventListener('DOMContentLoaded', init);

</script>
</body>
